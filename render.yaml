services:
  - type: web
    name: crisismind-ai-backend
    env: python
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://<your-vercel-app>.vercel.app
      - key: DATABASE_FILE
        value: crisismind.db
